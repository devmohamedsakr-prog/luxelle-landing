<div class="relative w-full">

  <!-- Trigger input -->
  <button
    type="button"
    (click)="toggleOpen()"
    class="luxelle-input w-full flex items-center justify-between gap-3 text-left cursor-pointer
           hover:border-luxelle-medium"
    [class.!border-rose-gold]="isOpen()"
    [disabled]="disabled()"
  >
    <div class="flex items-center gap-2.5 min-w-0">
      <lucide-icon name="calendar" class="w-4 h-4 text-rose-gold flex-shrink-0"></lucide-icon>
      <span [class]="displayValue() ? 'text-luxelle truncate' : 'text-luxelle-tertiary'">
        {{ displayValue() || placeholder() }}
      </span>
    </div>
    <lucide-icon
      name="chevron-down"
      class="w-4 h-4 text-luxelle-tertiary flex-shrink-0 transition-transform duration-300"
      [class.rotate-180]="isOpen()"
    ></lucide-icon>
  </button>

  <!-- Calendar panel -->
  <div
    *ngIf="isOpen()"
    class="absolute z-50 top-full left-0 mt-2 w-[320px]
           rounded-2xl border border-luxelle-medium p-4
           shadow-[0_20px_60px_-10px_rgba(0,0,0,0.5)]
           animate-scale-in origin-top"
    style="background: var(--bg-secondary);"
    (click)="$event.stopPropagation()"
  >
    <!-- Month navigation -->
    <div class="flex items-center justify-between mb-4">
      <button
        type="button"
        (click)="prevMonth()"
        class="w-8 h-8 rounded-xl flex items-center justify-center
               text-luxelle-tertiary hover:text-rose-gold hover:bg-rose-gold/10 transition-all"
      >
        <lucide-icon name="chevron-left" class="w-4 h-4"></lucide-icon>
      </button>

      <span class="text-sm font-semibold text-luxelle tracking-wide">
        {{ monthLabel() }}
      </span>

      <button
        type="button"
        (click)="nextMonth()"
        class="w-8 h-8 rounded-xl flex items-center justify-center
               text-luxelle-tertiary hover:text-rose-gold hover:bg-rose-gold/10 transition-all"
      >
        <lucide-icon name="chevron-right" class="w-4 h-4"></lucide-icon>
      </button>
    </div>

    <!-- Day-of-week headers -->
    <div class="grid grid-cols-7 mb-2">
      <div
        *ngFor="let day of DAYS"
        class="text-center text-[10px] font-semibold text-luxelle-tertiary uppercase tracking-wider py-1"
      >{{ day }}</div>
    </div>

    <!-- Calendar grid -->
    <div class="grid grid-cols-7 gap-0.5">
      <button
        *ngFor="let day of calendarDays()"
        type="button"
        (click)="selectDay(day)"
        [disabled]="day.isPast && !day.isToday"
        class="relative w-full aspect-square rounded-xl flex items-center justify-center
               text-[13px] font-medium transition-all duration-150"
        [ngClass]="{
          'text-luxelle-tertiary/30 cursor-not-allowed': day.isPast && !day.isToday,
          'opacity-30': !day.isCurrentMonth,
          'ring-1 ring-rose-gold/40 text-rose-gold': day.isToday && !day.isSelected,
          'bg-gradient-to-br from-rose-gold to-[#e09caa] text-luxelle-dark font-bold shadow-luxelle-glow': day.isSelected,
          'text-luxelle hover:bg-rose-gold/10 hover:text-rose-gold': day.isCurrentMonth && !day.isSelected && !(day.isPast && !day.isToday)
        }"
      >
        {{ day.date.getDate() }}
      </button>
    </div>

    <!-- Today shortcut -->
    <div class="mt-3 pt-3 border-t border-luxelle-subtle flex justify-between items-center">
      <span class="text-[11px] text-luxelle-tertiary">
        {{ today | date:'MMMM d, y' }}
      </span>
      <button
        type="button"
        (click)="selectDay({ date: today, isCurrentMonth: true, isToday: true, isSelected: false, isPast: false })"
        class="text-[11px] font-semibold text-rose-gold hover:text-warm-gold transition-colors"
      >
        Today
      </button>
    </div>
  </div>
</div>
