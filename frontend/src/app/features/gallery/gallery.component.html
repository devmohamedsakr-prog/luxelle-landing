<section id="gallery" class="section-padding relative overflow-hidden">
  <div class="absolute inset-0 bg-luxelle -z-10"></div>

  <div class="section-container">

    <!-- Header -->
    <div class="section-header" appScrollReveal>
      <span class="section-eyebrow">Visual Showcase</span>
      <h2 class="mb-4">Our <span class="text-gradient">Gallery</span></h2>
      <div class="accent-divider"></div>
      <p class="text-luxelle-tertiary mt-5 max-w-lg mx-auto text-base leading-relaxed">
        Explore the beauty and elegance of our premium facilities and luxury treatments.
      </p>
    </div>

    <!--
      Grid layout (8 images):
      Desktop (lg, 4 cols):
        Row 1 → [0 wide=2] [1] [2]
        Row 2 → [3] [4] [5 wide=2]
        Row 3 → [6 wide=2] [7 wide=2]
      Tablet (sm, 2 cols): all items 1 col, even stacking
      Mobile (1 col): full-width stacked
    -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
      <div
        *ngFor="let image of galleryImages; let i = index"
        appScrollReveal [animationType]="'fadeInUp'"
        [style.animation-delay]="(i * 70) + 'ms'"
        [ngClass]="isFeatured(i) ? 'lg:col-span-2' : 'lg:col-span-1'"
        class="group relative rounded-2xl overflow-hidden cursor-pointer
               border border-luxelle-subtle hover:border-luxelle-medium
               transition-all duration-500 hover:shadow-luxelle-card-hover"
        (click)="openLightbox(image)"
      >
        <!-- Image wrapper keeps correct aspect ratio -->
        <div
          class="w-full overflow-hidden relative"
          [ngClass]="isFeatured(i) ? 'aspect-video' : 'aspect-[4/3]'"
        >
          <!-- Skeleton shimmer while image loads -->
          <div
            *ngIf="!isImageLoaded(image.id)"
            class="absolute inset-0 bg-white/[0.04] animate-pulse"
          ></div>
          <img
            [src]="image.image"
            [alt]="image.alt"
            class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110"
            [class.opacity-0]="!isImageLoaded(image.id)"
            [class.opacity-100]="isImageLoaded(image.id)"
            loading="lazy"
            decoding="async"
            (load)="onImageLoad(image.id)"
          />
        </div>

        <!-- Bottom gradient overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent pointer-events-none"></div>

        <!-- Title / category badge -->
        <div class="absolute bottom-0 left-0 right-0 p-3
                    translate-y-1 group-hover:translate-y-0
                    transition-transform duration-300">
          <p class="text-white font-semibold text-sm leading-tight">{{ image.title }}</p>
          <span class="text-white/60 text-[10px] uppercase tracking-widest">{{ image.category }}</span>
        </div>

        <!-- Zoom icon on hover -->
        <div class="absolute top-3 right-3 w-8 h-8 rounded-xl
                    bg-white/10 backdrop-blur-sm border border-white/20
                    flex items-center justify-center
                    opacity-0 group-hover:opacity-100
                    scale-75 group-hover:scale-100
                    transition-all duration-300">
          <lucide-icon name="zoom-in" class="w-4 h-4 text-white"></lucide-icon>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Lightbox -->
<div
  *ngIf="selectedImage()"
  class="fixed inset-0 z-50 flex items-center justify-center p-4
         bg-black/90 backdrop-blur-md"
  (click)="closeLightbox()"
>
  <div
    class="relative w-full max-w-3xl animate-scale-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Close -->
    <button
      (click)="closeLightbox()"
      class="absolute -top-12 right-0 w-10 h-10 rounded-xl
             flex items-center justify-center
             text-white/70 hover:text-white hover:bg-white/10
             transition-all duration-200"
      aria-label="Close lightbox"
    >
      <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
    </button>

    <!-- Image card -->
    <div class="rounded-3xl overflow-hidden border border-luxelle-medium shadow-luxelle-card-hover">
      <img
        [src]="selectedImage()!.image"
        [alt]="selectedImage()!.alt"
        class="w-full aspect-video object-cover"
        loading="eager"
        decoding="async"
      />
      <!-- Caption -->
      <div class="bg-[#0c0c0e]/95 backdrop-blur-sm px-6 py-4
                  flex items-center justify-between
                  border-t border-luxelle-subtle">
        <div>
          <p class="text-luxelle font-semibold text-base">{{ selectedImage()!.title }}</p>
          <p class="text-luxelle-tertiary text-xs mt-0.5 uppercase tracking-wider">{{ selectedImage()!.category }}</p>
        </div>
        <span class="section-eyebrow !text-[10px]">Luxelle Gallery</span>
      </div>
    </div>
  </div>
</div>
