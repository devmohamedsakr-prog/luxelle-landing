<section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Animated background orbs -->
  <div class="absolute inset-0 z-0 overflow-hidden">
    <!-- Real hero background photo -->
    <img
      src="/assets/images/hero/hero-bg.png"
      alt="Luxelle premium beauty and wellness spa interior with rose-gold ambient lighting"
      class="absolute inset-0 w-full h-full object-cover"
      fetchpriority="high"
      loading="eager"
    />
    <!-- Darkening overlay so text remains readable -->
    <div class="absolute inset-0 bg-black/55"></div>
    <!-- Soft tinted gradient for brand feel -->
    <div class="absolute inset-0 bg-gradient-to-br from-[#e8b4bc]/10 via-transparent to-[#d4af37]/8"></div>
    <!-- Large ambient orbs (softer over image) -->
    <div class="orb orb-rose absolute w-[700px] h-[700px] -top-40 -left-40 opacity-30"></div>
    <div class="orb orb-gold  absolute w-[500px] h-[500px] -bottom-20 -right-20 opacity-25" style="animation-delay:-3s"></div>
    <!-- Fine dot grid -->
    <div class="absolute inset-0 opacity-[0.04]"
         style="background-image: radial-gradient(circle, var(--text-primary) 1px, transparent 1px); background-size: 32px 32px;"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 section-container text-center pt-24 pb-16">

    <!-- Eyebrow pill -->
    <div class="animate-fade-in flex justify-center mb-8">
      <span class="section-eyebrow">
        <span class="w-1.5 h-1.5 rounded-full bg-rose-gold inline-block animate-pulse"></span>
        Premium Beauty &amp; Wellness
      </span>
    </div>

    <!-- Headline -->
    <div [@fadeInUp] class="space-y-4 mb-8">
      <h1 class="font-bold leading-none tracking-tight">
        <span class="text-gradient">Luxelle</span>
      </h1>
      <h2 class="text-2xl md:text-3xl lg:text-4xl font-medium text-luxelle-secondary tracking-tight animate-fade-in delay-100">
        Where Beauty Meets Elegance
      </h2>
    </div>

    <!-- Subtitle -->
    <p class="text-base md:text-lg text-luxelle-tertiary max-w-xl mx-auto leading-relaxed animate-fade-in delay-200 mb-10">
      Experience luxury skincare, wellness, and beauty treatments in a sophisticated atmosphere crafted just for you.
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center animate-fade-in delay-300 mb-20">
      <app-button variant="primary" size="lg" (onClick)="scrollToServices()">
        Discover Our Services
      </app-button>
      <app-button variant="outline" size="lg" (onClick)="scrollToBooking()">
        Book Now
      </app-button>
    </div>

    <!-- Stats row -->
    <div class="animate-fade-in delay-400 grid grid-cols-3 gap-4 max-w-lg mx-auto">
      <div class="text-center px-3 py-4 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
        <div class="stat-number">500+</div>
        <div class="text-luxelle-tertiary text-xs mt-1 font-medium">Happy Clients</div>
      </div>
      <div class="text-center px-3 py-4 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
        <div class="stat-number">12+</div>
        <div class="text-luxelle-tertiary text-xs mt-1 font-medium">Expert Staff</div>
      </div>
      <div class="text-center px-3 py-4 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
        <div class="stat-number">8yr</div>
        <div class="text-luxelle-tertiary text-xs mt-1 font-medium">Experience</div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-10 left-1/2 animate-bounce-gentle">
    <div class="flex flex-col items-center gap-1.5 opacity-50">
      <span class="text-[10px] uppercase tracking-[0.2em] text-luxelle-tertiary font-medium">Scroll</span>
      <lucide-icon name="arrow-down" class="w-4 h-4 text-rose-gold"></lucide-icon>
    </div>
  </div>
</section>
