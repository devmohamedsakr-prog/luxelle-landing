name: Deploy to Production (Netlify & MonsterASP)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Build production
        run: npm run build:prod
        working-directory: frontend

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './frontend/dist/luxelle-landing-page'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production deployment from GitHub Actions'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-backend:
    name: Deploy Backend to MonsterASP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: backend

      - name: Publish
        run: dotnet publish -c Release -o ./publish
        working-directory: backend/src/Luxelle.API

      - name: Check FTP Credentials
        id: check-ftp
        run: |
          if [ -z "${{ secrets.MONSTERASP_FTP_SERVER }}" ] || [ -z "${{ secrets.MONSTERASP_FTP_USERNAME }}" ] || [ -z "${{ secrets.MONSTERASP_FTP_PASSWORD }}" ]; then
            echo "has-credentials=false" >> $GITHUB_OUTPUT
          else
            echo "has-credentials=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to MonsterASP via FTP
        if: steps.check-ftp.outputs.has-credentials == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.MONSTERASP_FTP_SERVER }}
          username: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          password: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          local-dir: ./backend/src/Luxelle.API/publish/
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json

      - name: FTP Deployment Skipped
        if: steps.check-ftp.outputs.has-credentials != 'true'
        run: |
          echo "⚠️  FTP deployment skipped - MonsterASP credentials not configured"
          echo "To enable backend deployment, add these secrets to your GitHub repository:"
          echo "  - MONSTERASP_FTP_SERVER"
          echo "  - MONSTERASP_FTP_USERNAME"
          echo "  - MONSTERASP_FTP_PASSWORD"

